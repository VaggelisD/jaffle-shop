unit_tests:
  - name: ut_locations_passes_through_location_id
    description: "location_id flows through unchanged from stg_locations."
    model: locations
    given:
      - input: ref('stg_locations')
        rows:
          - {location_id: 1}
    expect:
      rows:
        - {location_id: 1}

  - name: ut_locations_passes_through_name
    description: "location_name flows through unchanged from stg_locations."
    model: locations
    given:
      - input: ref('stg_locations')
        rows:
          - {location_id: 1, location_name: "Vice City"}
    expect:
      rows:
        - {location_id: 1, location_name: "Vice City"}

  - name: ut_locations_passes_through_tax_rate
    description: "tax_rate flows through unchanged from stg_locations."
    model: locations
    given:
      - input: ref('stg_locations')
        rows:
          - {location_id: 1, tax_rate: 0.0825}
    expect:
      rows:
        - {location_id: 1, tax_rate: 0.0825}

  - name: ut_locations_passes_through_opened_date
    description: "opened_date flows through unchanged from stg_locations."
    model: locations
    given:
      - input: ref('stg_locations')
        rows:
          - {location_id: 1, opened_date: "2016-09-01"}
    expect:
      rows:
        - {location_id: 1, opened_date: "2016-09-01"}

  - name: ut_locations_preserves_multiple_rows
    description: "Every staging row produces exactly one mart row."
    model: locations
    given:
      - input: ref('stg_locations')
        rows:
          - {location_id: 1, location_name: "A"}
          - {location_id: 2, location_name: "B"}
    expect:
      rows:
        - {location_id: 1, location_name: "A"}
        - {location_id: 2, location_name: "B"}

semantic_models:
  - name: locations
    description: |
      Location dimension table. The grain of the table is one row per location.
    model: ref('locations')
    defaults:
      agg_time_dimension: opened_date
    entities:
      - name: location
        type: primary
        expr: location_id
    dimensions:
      - name: location_name
        type: categorical
      - name: opened_date
        expr: opened_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: average_tax_rate
        description: Average tax rate.
        expr: tax_rate
        agg: average
